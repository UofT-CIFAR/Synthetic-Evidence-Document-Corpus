# Paths for the Synthetic Evidence Corpus pipeline. Everything is rooted at
# `project_root`; derived paths are resolved relative to it by `sec.config`.

project_root: /mnt/data/jaleh/CIFAR/SyntheticEvidenceCorpus

corpus_dir: corpus
manifest_path: manifest/manifest.parquet
logs_dir: logs
prompts_log_dir: prompts_log
qa_dir: qa
audit_dir: audit
style_pools_dir: style_pools
assets_dir: assets

sources:
  sroie:
    root: /mnt/data/jaleh/CIFAR/Datasets/SROIE2019
    task1_train_dir: "0325updated.task1train(626p)"
    task2_train_dir: "0325updated.task2train(626p)"
    test_image_dir: "task1&2_test(361p)"
    test_text_dir: "text.task1&2-test（361p)"
  cord:
    # HuggingFace dataset naver-clova-ix/cord-v2. `root` is a local cache dir
    # under which images are materialised as PNGs for the pipeline; `hf_cache`
    # points the HF datasets library at a persistent download location.
    root: /mnt/data/jaleh/CIFAR/Datasets/CORD-v2-cache
    hf_cache: /mnt/data/jaleh/CIFAR/Datasets/CORD-v2-cache/hf
    hf_name: naver-clova-ix/cord-v2
  findit:
    # FindIt2 (SROIE-style receipts: train/val/test with png + plain transcript).
    # Pre-forged rows (forged=1 in split CSV) are excluded by the loader.
    root: /mnt/data/jaleh/CIFAR/Datasets/findit2
  enron:
    root: /mnt/data/jaleh/CIFAR/Datasets/Enron_Emails_Dataset
    # One relative path per line under ``root``; avoids walking the full Enron tree at startup.
    mail_index: configs/cache/enron_mail_paths.txt
  avocado:
    root: /mnt/data/jaleh/CIFAR/Datasets/avocado-1.0.2
  rvl_cdip_email:
    # HF mirror chainyo/rvl-cdip — email class only (see ``sec.sources.rvl_cdip_email``).
    root: /mnt/data/jaleh/CIFAR/Datasets/RVL-CDIP-email-cache
    hf_cache: /mnt/data/jaleh/CIFAR/Datasets/RVL-CDIP-email-cache/hf
    hf_name: chainyo/rvl-cdip
  rvl_cdip_doc:
    # HF mirror chainyo/rvl-cdip — all classes except email (``sec.sources.rvl_cdip_non_email``).
    # Full export is ~15/16 of each loaded split (very large). Speed tips: set ``splits: [train]``
    # to skip val/test; raise ``materialize_workers`` (e.g. 8) for parallel PNG writes; use
    # ``max_items`` or env ``SEC_RVL_CDIP_DOC_MAX_ITEMS`` for pilots.
    root: /mnt/data/jaleh/CIFAR/Datasets/RVL-CDIP-doc-cache
    hf_cache: /mnt/data/jaleh/CIFAR/Datasets/RVL-CDIP-doc-cache/hf
    hf_name: chainyo/rvl-cdip
    splits: [train]
    materialize_workers: 4
  dude_amazon:
    # DUDE ICDAR challenge PDFs — Amazon OCR / original format (``sec.sources.dude_amazon``).
    root: /mnt/data/jaleh/CIFAR/Datasets/DUDE-doc-cache
    hf_cache: /mnt/data/jaleh/CIFAR/Datasets/DUDE-doc-cache/hf
    hf_config: Amazon_original
    pdf_dpi: 200
  ucsf_doc:
    # UCSF Industry Documents — letter/memo/report PDFs for DOC test pool (spec §3.1).
    root: /mnt/data/jaleh/CIFAR/UCSF/downloads
    metadata_file: metadata.json
    pdf_dpi: 200

pool_split:
  # Disjoint by document ID: hash(doc_id) % 100 < 75 -> train else test.
  train_bucket_max_exclusive: 75
